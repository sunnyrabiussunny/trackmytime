<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackMyTime</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 300px; min-height: 360px;
  font-family: 'Inter', system-ui, sans-serif;
  background: #0f1117; color: #e2e8f0; font-size: 13px;
}
.header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 10px; border-bottom: 1px solid #2e3250;
}
.header svg { color: #6366f1; }
.header span { font-size: 15px; font-weight: 700; flex: 1; }
.header a { color: #64748b; font-size: 11px; text-decoration: none; }
.header a:hover { color: #6366f1; }
.section { padding: 12px 16px; }
.label { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
select, input {
  width: 100%; background: #1a1d27; border: 1px solid #2e3250;
  color: #e2e8f0; padding: 7px 10px; border-radius: 7px; font-size: 13px; margin-bottom: 8px;
}
select:focus, input:focus { outline: none; border-color: #6366f1; }
input::placeholder { color: #64748b; }
.timer-display {
  text-align: center; font-size: 36px; font-weight: 700;
  font-variant-numeric: tabular-nums; padding: 12px 0; letter-spacing: -1px;
  color: #e2e8f0;
}
.timer-display.running { color: #22c55e; }
.btn {
  width: 100%; padding: 10px; border-radius: 8px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s;
}
.btn-start { background: #22c55e; color: #fff; }
.btn-start:hover { background: #16a34a; }
.btn-stop { background: #ef4444; color: #fff; }
.btn-stop:hover { background: #dc2626; }
.running-info {
  display: none; background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2);
  border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
}
.running-info.show { display: block; }
.running-project { font-weight: 700; font-size: 14px; color: #22c55e; }
.running-note { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.status { text-align: center; padding: 6px 0; font-size: 11px; color: #64748b; }
.server-row { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-top: 1px solid #2e3250; }
.server-row input { margin: 0; flex: 1; font-size: 11px; padding: 5px 8px; }
.server-row button { background: #6366f1; color: #fff; border: none; border-radius: 5px; padding: 5px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>
<div class="header">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  <span>TrackMyTime</span>
  <a id="open-app" href="#" target="_blank">Open App ↗</a>
</div>

<div class="section">
  <div class="running-info" id="running-info">
    <div class="running-project" id="running-project">Project</div>
    <div class="running-note" id="running-note"></div>
  </div>

  <div class="timer-display" id="timer-display">00:00:00</div>

  <div id="start-form">
    <div class="label">Project</div>
    <select id="project-select"><option value="">Loading...</option></select>
    <div class="label">Note</div>
    <input id="note-input" type="text" placeholder="What are you working on?">
    <button class="btn btn-start" onclick="startTimer()">▶ Start Timer</button>
  </div>

  <div id="stop-form" style="display:none;">
    <button class="btn btn-stop" onclick="stopTimer()">■ Stop Timer</button>
  </div>
</div>

<div class="status" id="status"></div>

<div class="server-row">
  <input id="server-url" type="text" placeholder="http://192.168.10.103:8888">
  <button onclick="saveServer()">Save</button>
</div>

<script src="popup.js"></script>
</body>
</html>
